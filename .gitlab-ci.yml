stages:
  - build
  - test
  - deploy

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

before_script:
  - 'dotnet --version'

build:
  stage: build
  script:
    - dotnet restore
    - dotnet build --configuration Release
  tags:
    - docker

test:
  stage: test
  script:
    - dotnet test
  tags:
    - docker

deploy:
  stage: deploy
  script:
    - echo "«десь будет деплой. ѕока просто заглушка."
  tags:
    - docker
